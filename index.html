        <!-- Embed Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        />

        <!-- Fonts Awesome -->

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- Reset CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />
        <!-- Styles CSS -->
        <link rel="stylesheet" href="./assets/css/styles.css" />
    </head>
    <body>
        <!-- Header -->
        <header class="header header-sticky">
            <div class="container">
                <div class="header-wrapper">
                    <!-- Header logo -->
                    <div class="header__logo">
                        <a href="./" class="header__logo-link">
                            <figure class="header__logo-img">
                                <img
                                    loading="lazy"
                                    src="./assets/img/logo-img/Modulars-logo.svg"
                                    alt="Modulars-logo"
                                />
                            </figure>
                        </a>
                    </div>
                    <!-- Header nav -->
                    <nav class="header__nav">
                        <ul class="header__nav-list">
                            <li class="header__nav-item">
                                <a
                                    href="#!"
                                    class="header__nav-item-link header__nav-item-link--active"
                                >
                                    Home
                                </a>
                            </li>
                            <li class="header__nav-item">
                                <a href="#!" class="header__nav-item-link">
                                    About
                                </a>
                            </li>
                            <li class="header__nav-item">
                                <a href="#!" class="header__nav-item-link">
                                    Blog
                                </a>
                            </li>
                            <li class="header__nav-item">
                                <a href="#!" class="header__nav-item-link">
                                    Contact
                                </a>
                            </li>
                        </ul>
                    </nav>
                    <!-- Header signup -->
                    <div class="header__sign-up">
                        <a href="#!" class="btn">Sign Up</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Hero -->
        <section class="hero">
            <div class="container">
                <div class="hero-wrapper">
                    <!-- Hero left -->
                    <div class="hero-bottom__left">
                        <h1 class="hero__heading">
                            We’re a creative design agency.
                        </h1>
                        <p class="hero__desc">
                            A brilliant, modular agency template for startup’s
                            build yours toady.
                        </p>
                        <div class="hero__cta">
                            <div class="hero-btn-contact">
                                <a href="#!" class="btn">Get in touch</a>
                            </div>
                            <div class="hero-play-btn">
                                <div class="hero-play-btn__wrapper">
                                    <a href="#!" class="hero-play-btn__ellipse">
                                        <img
                                            loading="lazy"
                                            src="./assets/img/icons/ellipse-icon.svg"
                                            alt=""
                                        />
                                    </a>
                                    <a href="#!" class="hero-play-btn-icon">
                                        <img
                                            loading="lazy"
                                            class="hero-play-btn-icon__img"
                                            src="./assets/img/icons/play-btn-icon.svg"
                                            alt=""
                                        />
                                    </a>
                                </div>
                                <a href="#!" class="hero-play-btn__link">
                                    <span>Watch Video</span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Hero right -->
                    <div class="hero-bottom__right">
                        <div class="hero__media-list">
                            <figure class="hero__media-item">
                                <img
                                    loading="lazy"
                                    src="./assets/img/media/img-media1.png"
                                    alt=""
                                    class="hero__media-img"
                                />
                            </figure>
                            <figure class="hero__media-item">
                                <img
                                    loading="lazy"
                                    src="./assets/img/media/imd-media2.png"
                                    alt=""
                                    class="hero__media-img"
                                />
                            </figure>
                            <figure class="hero__media-item">
                                <img
                                    loading="lazy"
                                    src="./assets/img/media/img-media3.png"
                                    alt=""
                                    class="hero__media-img"
                                />
                            </figure>
                        </div>
                        <img
                            loading="lazy"
                            src="./assets/img/media/img-flower.svg"
                            alt=""
                            class="hero__img-pos-1"
                        />
                        <img
                            loading="lazy"
                            src="./assets/img/media/img-line-vector1.svg"
                            alt=""
                            class="hero__img-pos-2"
                        />
                        <img
                            loading="lazy"
                            src="./assets/img/media/img-flower.svg"
                            alt=""
                            class="hero__img-pos-3"
                        />
                        <img
                            loading="lazy"
                            src="./assets/img/media/img-line-vector2.svg"
                            alt=""
                            class="hero__img-pos-4"
                        />
                        <div class="hero__bg-blur-color"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Banner -->
        <div class="banner">
            <div class="container">
                <div class="banner-wrapper">
                    <ul class="banner__list">
                        <li class="banner__item">
                            <a href="#!" class="banner__item-link">
                                <i class="fa-brands fa-google"></i>
                                Google
                            </a>
                        </li>
                        <li class="banner__item">
                            <a href="#!" class="banner__item-link">
                                <i class="fa-brands fa-slack"></i>
                                Slack
                            </a>
                        </li>
                        <li class="banner__item">
                            <a href="#!" class="banner__item-link">
                                <i class="fa-brands fa-discord"></i>
                                Discord
                            </a>
                        </li>
                        <li class="banner__item">
                            <a href="#!" class="banner__item-link">
                                <i class="fa-brands fa-telegram"></i>
                                Telegram
                            </a>
                        </li>
                        <li class="banner__item">
                            <a href="#!" class="banner__item-link">
                                <i class="fa-brands fa-square-x-twitter"></i>
                                Twitter
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </body>
</html>
